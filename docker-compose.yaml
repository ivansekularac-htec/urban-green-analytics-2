services:
  postgres:
    image: postgres:17
    container_name: urbangreen-postgres

    env_file:
      - .env

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - urbangreen-postgres-data:/var/lib/postgresql/data

    networks:
      - urbangreen-network

    restart: unless-stopped

volumes:
  urbangreen-postgres-data:

networks:
  urbangreen-network:
    name: urbangreen-network
    driver: bridge