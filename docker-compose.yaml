services:
  postgres:
    image: postgres:16
    container_name: urbangreen-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - urbangreen-postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
      - ./data:/data

    networks:
      - urbangreen-network

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: urbangreen-api
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_SCHEMA: ${POSTGRES_SCHEMA:-app}
      JWT_SECRET: ${API_JWT_SECRET}
      JWT_ALGORITHM: ${API_JWT_ALGORITHM:-HS256}
      JWT_EXPIRES_MINUTES: ${API_JWT_EXPIRES_MINUTES:-60}
      SUPERUSER_EMAIL: ${API_SUPERUSER_EMAIL}
      SUPERUSER_PASSWORD: ${API_SUPERUSER_PASSWORD}
      SUPERUSER_FULL_NAME: ${API_SUPERUSER_FULL_NAME}

    ports:
      - "${API_PORT:-8000}:8000"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - urbangreen-network

    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio:
    build:
      context: ./infra/minio
      dockerfile: Dockerfile
    container_name: urbangreen-minio
    restart: unless-stopped

    command: [ "server", "/data", "--address", ":9000", "--console-address", ":9001" ]

    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    volumes:
      - urbangreen-minio-volume:/data

    networks:
      - urbangreen-network

    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    container_name: urbangreen-minio-init
    restart: "no"

    depends_on:
      minio:
        condition: service_healthy

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_PORT: 9000
      MINIO_STAGING_BUCKET: ${MINIO_STAGING_BUCKET:-staging}

    entrypoint: [ "/bin/sh", "/scripts/init-bucket.sh" ]

    volumes:
      - ./infra/minio/init:/scripts:ro

    networks:
      - urbangreen-network

  airflow:
    build:
      context: ./infra/airflow
      dockerfile: Dockerfile
    image: urbangreen-airflow:latest
    container_name: urbangreen-airflow
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

    command:
      - bash
      - -c
      - |
        airflow db migrate

        airflow connections delete "$${POSTGRES_EXTRACT_CONN_ID:-urbangreen_db}" >/dev/null 2>&1 || true
        airflow connections add "$${POSTGRES_EXTRACT_CONN_ID:-urbangreen_db}" \
          --conn-type postgres \
          --conn-host postgres \
          --conn-login "$${POSTGRES_USER}" \
          --conn-password "$${POSTGRES_PASSWORD}" \
          --conn-schema "$${POSTGRES_DB}" \
          --conn-port 5432

        airflow connections delete "$${MINIO_CONN_ID:-urbangreen_minio}" >/dev/null 2>&1 || true
        airflow connections add "$${MINIO_CONN_ID:-urbangreen_minio}" \
          --conn-type aws \
          --conn-login "$${MINIO_ROOT_USER}" \
          --conn-password "$${MINIO_ROOT_PASSWORD}" \
          --conn-extra "{\"endpoint_url\":\"http://minio:9000\",\"region_name\":\"us-east-1\"}"

        exec airflow standalone

    user: "${AIRFLOW_UID:-50000}:0"

    ports:
      - "${AIRFLOW_PORT:-8080}:${AIRFLOW_PORT:-8080}"

    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW_PORT: ${AIRFLOW_PORT:-8080}
      AIRFLOW__API__PORT: ${AIRFLOW_PORT:-8080}
      AIRFLOW__WEBSERVER__WEB_SERVER_PORT: ${AIRFLOW_PORT:-8080}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "true"
      AIRFLOW__CORE__TEST_CONNECTION: "Enabled"

      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_STAGING_BUCKET: ${MINIO_STAGING_BUCKET:-staging}
      MINIO_STAGING_PREFIX: ${MINIO_STAGING_PREFIX:-app/raw/postgres}

      POSTGRES_EXTRACT_CONN_ID: ${POSTGRES_EXTRACT_CONN_ID:-urbangreen_db}
      MINIO_CONN_ID: ${MINIO_CONN_ID:-urbangreen_minio}
      EXTRACT_CHUNK_SIZE: ${EXTRACT_CHUNK_SIZE:-100000}

    volumes:
      - urbangreen-airflow-logs-volume:/opt/airflow/logs
      - ./etl/dags:/opt/airflow/dags

    networks:
      - urbangreen-network

    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:$${AIRFLOW_PORT:-8080}/api/v2/monitor/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G

volumes:
  urbangreen-postgres-data:
    name: urbangreen-postgres-data

  urbangreen-minio-volume:
    name: urbangreen-minio-volume

  urbangreen-airflow-logs-volume:
    name: urbangreen-airflow-logs-volume

networks:
  urbangreen-network:
    name: urbangreen-network
