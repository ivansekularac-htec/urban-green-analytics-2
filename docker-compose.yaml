services:
  urbangreen-db:
    image: postgres:17
    container_name: urbangreen-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-urbangreen}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - urbangreen-db-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - urbangreen-network

volumes:
  urbangreen-db-data:

networks:
  urbangreen-network:
    driver: bridge