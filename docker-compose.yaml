services:
  postgres:
    image: postgres:17
    container_name: urbangreen-db
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - urbangreen-db-data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro

    networks:
      - urbangreen-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  urbangreen-db-data:

networks:
  urbangreen-network:
    driver: bridge
    