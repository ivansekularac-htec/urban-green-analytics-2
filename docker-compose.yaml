services:
  urbangreen-postgres:
    image: postgres:16
    container_name: urbangreen-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - urbangreen-postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
      - ./data:/data

    networks:
      - urbangreen-network

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  urbangreen-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: urbangreen-api
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: urbangreen-postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_SCHEMA: ${POSTGRES_SCHEMA:-app}
      JWT_SECRET: ${API_JWT_SECRET}
      JWT_ALGORITHM: ${API_JWT_ALGORITHM:-HS256}
      JWT_EXPIRES_MINUTES: ${API_JWT_EXPIRES_MINUTES:-60}
      SUPERUSER_EMAIL: ${API_SUPERUSER_EMAIL}
      SUPERUSER_PASSWORD: ${API_SUPERUSER_PASSWORD}
      SUPERUSER_FULL_NAME: ${API_SUPERUSER_FULL_NAME}

    ports:
      - "${API_PORT:-8000}:8000"

    depends_on:
      urbangreen-postgres:
        condition: service_healthy

    networks:
      - urbangreen-network

    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  urbangreen-minio:
    build:
      context: ./infra/minio
      dockerfile: Dockerfile
    container_name: urbangreen-minio
    restart: unless-stopped

    command: [ "server", "/data", "--address", ":${MINIO_API_PORT:-9000}", "--console-address", ":${MINIO_CONSOLE_PORT:-9001}" ]

    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    volumes:
      - urbangreen-minio-data:/data

    networks:
      - urbangreen-network

    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:$${MINIO_API_PORT:-9000}/minio/health/live || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  urbangreen-minio-init:
    image: minio/mc:latest
    container_name: urbangreen-minio-init

    depends_on:
      urbangreen-minio:
        condition: service_healthy

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_PORT: ${MINIO_API_PORT:-9000}
      MINIO_STAGING_BUCKET: ${MINIO_STAGING_BUCKET:-staging}

    entrypoint: [ "/bin/sh", "/scripts/init-bucket.sh" ]

    volumes:
      - ./infra/minio/init:/scripts:ro

    networks:
      - urbangreen-network

    restart: "no"

  urbangreen-airflow:
    build:
      context: ./infra/airflow
      dockerfile: Dockerfile
    container_name: urbangreen-airflow
    image: urbangreen-airflow:latest
    restart: unless-stopped

    depends_on:
      urbangreen-postgres:
        condition: service_healthy

    entrypoint: [ "/bin/sh", "/scripts/init-airflow.sh" ]

    user: "${AIRFLOW_UID:-50000}:0"

    ports:
      - "${AIRFLOW_PORT:-8080}:${AIRFLOW_PORT:-8080}"

    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW_PORT: ${AIRFLOW_PORT:-8080}
      AIRFLOW__API__PORT: ${AIRFLOW_PORT:-8080}
      AIRFLOW__WEBSERVER__WEB_SERVER_PORT: ${AIRFLOW_PORT:-8080}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "true"

      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}

      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniominio}
      MINIO_API_PORT: ${MINIO_API_PORT:-9000}
      MINIO_STAGING_BUCKET: ${MINIO_STAGING_BUCKET:-staging}

      SPARK_MASTER_PORT: ${SPARK_MASTER_PORT:-7077}

    volumes:
      - urbangreen-airflow-logs-volume:/opt/airflow/logs
      - ./etl/dags:/opt/airflow/dags
      - ./infra/airflow/init:/scripts:ro

    networks:
      - urbangreen-network

    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:$${AIRFLOW_PORT:-8080}/api/v2/monitor/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G

  urbangreen-kafka:
    image: apache/kafka:latest
    container_name: urbangreen-kafka
    restart: unless-stopped

    environment:
      KAFKA_PORT_INTERNAL: ${KAFKA_PORT_INTERNAL:-9092}
      KAFKA_PORT_HOST: ${KAFKA_PORT_HOST:-29092}
      KAFKA_PORT_CONTROLLER: ${KAFKA_PORT_CONTROLLER:-9093}

      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://:${KAFKA_PORT_INTERNAL:-9092},CONTROLLER://:${KAFKA_PORT_CONTROLLER:-9093},PLAINTEXT_HOST://:${KAFKA_PORT_HOST:-29092}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://urbangreen-kafka:${KAFKA_PORT_INTERNAL:-9092},PLAINTEXT_HOST://localhost:${KAFKA_PORT_HOST:-29092}

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@urbangreen-kafka:${KAFKA_PORT_CONTROLLER:-9093}
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: ${CLUSTER_ID}

    ports:
      - "${KAFKA_PORT_HOST:-29092}:${KAFKA_PORT_HOST:-29092}"

    volumes:
      - urbangreen-kafka-volume:/var/lib/kafka/data

    networks:
      - urbangreen-network

    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:$${KAFKA_PORT_INTERNAL} --list >/dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 45s

  urbangreen-kafka-init:
    image: apache/kafka:latest
    container_name: urbangreen-kafka-init

    depends_on:
      urbangreen-kafka:
        condition: service_healthy

    environment:
      KAFKA_PORT_INTERNAL: ${KAFKA_PORT_INTERNAL:-9092}
      KAFKA_TOPIC_SENSOR_READINGS: ${KAFKA_TOPIC_SENSOR_READINGS:-sensor_readings}

    entrypoint: [ "/bin/sh", "/scripts/init-topics.sh" ]

    volumes:
      - ./infra/kafka/init:/scripts:ro

    networks:
      - urbangreen-network

    restart: "no"

  urbangreen-spark-master:
    build:
      context: ./infra/spark
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: urbangreen-spark-master

    entrypoint: [ "/bin/sh", "/opt/spark/init/init-master.sh" ]

    environment:
      SPARK_MASTER_PORT: ${SPARK_MASTER_PORT:-7077}
      SPARK_MASTER_UI_PORT: ${SPARK_MASTER_UI_PORT:-8090}

    ports:
      - "${SPARK_MASTER_PORT:-7077}:${SPARK_MASTER_PORT:-7077}"
      - "${SPARK_MASTER_UI_PORT:-8090}:${SPARK_MASTER_UI_PORT:-8090}"

    networks:
      - urbangreen-network

    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:$${SPARK_MASTER_UI_PORT:-8090}/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    volumes:
      - ./etl/ingestion:/opt/spark/ingestion:ro

  urbangreen-spark-worker-1:
    build:
      context: ./infra/spark
      dockerfile: Dockerfile
    container_name: urbangreen-spark-worker-1
    restart: unless-stopped
    hostname: urbangreen-spark-worker-1

    entrypoint: [ "/bin/sh", "/opt/spark/init/init-worker.sh" ]

    environment:
      SPARK_MASTER_PORT: ${SPARK_MASTER_PORT:-7077}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES:-1}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY:-1g}

    depends_on:
      urbangreen-spark-master:
        condition: service_healthy

    networks:
      - urbangreen-network

  urbangreen-spark-worker-2:
    build:
      context: ./infra/spark
      dockerfile: Dockerfile
    container_name: urbangreen-spark-worker-2
    restart: unless-stopped
    hostname: urbangreen-spark-worker-2

    entrypoint: [ "/bin/sh", "/opt/spark/init/init-worker.sh" ]

    environment:
      SPARK_MASTER_PORT: ${SPARK_MASTER_PORT:-7077}
      SPARK_WORKER_CORES: ${SPARK_WORKER_CORES:-1}
      SPARK_WORKER_MEMORY: ${SPARK_WORKER_MEMORY:-1g}

    depends_on:
      urbangreen-spark-master:
        condition: service_healthy

    networks:
      - urbangreen-network

  urbangreen-sensor-simulator:
    container_name: urbangreen-sensor-simulator
    build:
      context: ./simulator
      dockerfile: Dockerfile
    restart: unless-stopped

    depends_on:
      urbangreen-kafka:
        condition: service_healthy
      urbangreen-kafka-init:
        condition: service_completed_successfully

    environment:
      SIMULATOR_KAFKA_BOOTSTRAP: ${SIMULATOR_KAFKA_BOOTSTRAP:-urbangreen-kafka:9092}
      SIMULATOR_BACKFILL_DAYS: ${SIMULATOR_BACKFILL_DAYS:-365}
      SIMULATOR_BACKFILL_EVENTS_PER_DAY: ${SIMULATOR_BACKFILL_EVENTS_PER_DAY:-4}
      SIMULATOR_LIVE_INTERVAL_SECONDS: ${SIMULATOR_LIVE_INTERVAL_SECONDS:-600}
      SIMULATOR_OUTLIER_PROBABILITY: ${SIMULATOR_OUTLIER_PROBABILITY:-0.01}
      SIMULATOR_LOG_LEVEL: ${SIMULATOR_LOG_LEVEL:-INFO}
      KAFKA_TOPIC_SENSOR_READINGS: ${KAFKA_TOPIC_SENSOR_READINGS:-sensor_readings}

    volumes:
      - urbangreen-simulator-volume:/state

    networks:
      - urbangreen-network

  urbangreen-jupyter:
    profiles:
      - dev

    container_name: urbangreen-jupyter
    build:
      context: .
      dockerfile: ./infra/jupyter/Dockerfile
    ports:
      - "${JUPYTER_PORT:-8888}:${JUPYTER_PORT:-8888}"
      - "${SPARK_UI_PORT:-4040}:${SPARK_UI_PORT:-4040}"
    volumes:
      - ./notebooks:/home/jovyan/work
    networks:
      - urbangreen-network

volumes:
  urbangreen-postgres-data:
    name: urbangreen-postgres-data

  urbangreen-minio-data:
    name: urbangreen-minio-volume

  urbangreen-airflow-logs-volume:
    name: urbangreen-airflow-logs-volume

  urbangreen-kafka-volume:
    name: urbangreen-kafka-volume

  urbangreen-simulator-volume:
    name: urbangreen-simulator-volume

networks:
  urbangreen-network:
    name: urbangreen-network
