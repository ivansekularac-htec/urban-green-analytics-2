services:
  postgres:
    image: postgres:17
    ports:
    - "5432:5432"
    container_name: urbangreen-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d/
    networks:
      - urbangreen-network


volumes:
  postgres_data:

networks:
  urbangreen-network:  