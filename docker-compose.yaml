services:
  postgres:
    image: postgres:16
    container_name: urbangreen-postgres
    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - urbangreen-postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d

    networks:
      - urbangreen-network

volumes:
  urbangreen-postgres-data:
    name: urbangreen-postgres-data

networks:
  urbangreen-network:
    name: urbangreen-network
