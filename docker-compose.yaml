services:
  postgres:
    image: postgres:16
    container_name: urbangreen-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - urbangreen-postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
      - ./data:/data

    networks:
      - urbangreen-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: urbangreen-api
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: urbangreen-postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_SCHEMA: ${POSTGRES_SCHEMA:-app}
      JWT_SECRET: ${API_JWT_SECRET}
      JWT_ALGORITHM: ${API_JWT_ALGORITHM:-HS256}
      JWT_EXPIRES_MINUTES: ${API_JWT_EXPIRES_MINUTES:-60}
      SUPERUSER_EMAIL: ${API_SUPERUSER_EMAIL}
      SUPERUSER_PASSWORD: ${API_SUPERUSER_PASSWORD}
      SUPERUSER_FULL_NAME: ${API_SUPERUSER_FULL_NAME}

    ports:
      - "${API_PORT:-8000}:8000"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - urbangreen-network

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio:
    build:
      context: ./infra/minio
      dockerfile: Dockerfile
    container_name: urbangreen-minio
    restart: unless-stopped

    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - urbangreen-minio-data:/data
    networks:
      - urbangreen-network

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:$${MINIO_API_PORT:-9000}/minio/health/live || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  urbangreen-postgres-data:
    name: urbangreen-postgres-data
  urbangreen-minio-data:
    name: urbangreen-minio-data

networks:
  urbangreen-network:
    name: urbangreen-network
