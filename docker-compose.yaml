services:
  postgres:
    image: postgres:17

    container_name: urban-green-postgres

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d/
      - ./data:/var/lib/postgresql/data_import/

    networks:
      - urbangreen-network

volumes:
  postgres_data:

networks:
  urbangreen-network:
    driver: bridge