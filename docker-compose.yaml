services:
  postgres:
    image: postgres:16
    container_name: urbangreen-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      - urbangreen-postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
      - ./data:/data

    networks:
      - urbangreen-network

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: urbangreen-api
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: urbangreen-postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_SCHEMA: ${POSTGRES_SCHEMA:-app}
      JWT_SECRET: ${API_JWT_SECRET}
      JWT_ALGORITHM: ${API_JWT_ALGORITHM:-HS256}
      JWT_EXPIRES_MINUTES: ${API_JWT_EXPIRES_MINUTES:-60}
      SUPERUSER_EMAIL: ${API_SUPERUSER_EMAIL}
      SUPERUSER_PASSWORD: ${API_SUPERUSER_PASSWORD}
      SUPERUSER_FULL_NAME: ${API_SUPERUSER_FULL_NAME}

    ports:
      - "${API_PORT:-8000}:8000"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - urbangreen-network

    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio:
    build:
      context: ./infra/minio
      dockerfile: Dockerfile
    container_name: urbangreen-minio
    restart: unless-stopped

    command: [ "server", "/data", "--address", ":${MINIO_API_PORT:-9000}", "--console-address", ":${MINIO_CONSOLE_PORT:-9001}" ]

    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - urbangreen-minio-data:/data
    networks:
      - urbangreen-network

    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:$${MINIO_API_PORT:-9000}/minio/health/live || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    container_name: urbangreen-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_PORT: ${MINIO_API_PORT:-9000}
      MINIO_STAGING_BUCKET: ${MINIO_STAGING_BUCKET:-staging}
    entrypoint: [ "/bin/sh", "/scripts/init-bucket.sh" ]
    volumes:
      - ./infra/minio/init:/scripts:ro
    networks:
      - urbangreen-network
    restart: "no"

  airflow:
    build:
      context: ./infra/airflow
      dockerfile: Dockerfile
    image: urbangreen-airflow:latest
    container_name: urbangreen-airflow
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

    command:
      - bash
      - -c
      - |
        airflow db migrate

        airflow connections delete urbangreen_db >/dev/null 2>&1 || true
        airflow connections add urbangreen_db \
          --conn-type postgres \
          --conn-host postgres \
          --conn-login "$${POSTGRES_USER}" \
          --conn-password "$${POSTGRES_PASSWORD}" \
          --conn-schema "$${POSTGRES_DB}" \
          --conn-port 5432

        airflow connections delete urbangreen_minio >/dev/null 2>&1 || true
        airflow connections add urbangreen_minio \
          --conn-type aws \
          --conn-login "$${MINIO_ROOT_USER:-minio}" \
          --conn-password "$${MINIO_ROOT_PASSWORD:-miniominio}" \
          --conn-extra "{\"endpoint_url\":\"http://minio:$${MINIO_API_PORT:-9000}\",\"region_name\":\"us-east-1\"}"

        airflow connections delete urbangreen_spark >/dev/null 2>&1 || true
        airflow connections add urbangreen_spark \
          --conn-type spark \
          --conn-host spark://urbangreen-spark-master \
          --conn-port "$${SPARK_MASTER_PORT:-7077}"

        exec airflow standalone

    user: "${AIRFLOW_UID:-50000}:0"
    ports:
      - "${AIRFLOW_PORT:-8080}:${AIRFLOW_PORT:-8080}"

    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW_PORT: ${AIRFLOW_PORT:-8080}
      AIRFLOW__API__PORT: ${AIRFLOW_PORT:-8080}
      AIRFLOW__WEBSERVER__WEB_SERVER_PORT: ${AIRFLOW_PORT:-8080}
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "true"
      AIRFLOW__CORE__TEST_CONNECTION: "Enabled"

      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}

      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniominio}
      MINIO_API_PORT: ${MINIO_API_PORT:-9000}
      MINIO_STAGING_BUCKET: ${MINIO_STAGING_BUCKET:-staging}
      MINIO_STAGING_PREFIX: ${MINIO_STAGING_PREFIX:-staging/postgres/app}
      EXTRACT_SAFETY_LAG_SECONDS: ${EXTRACT_SAFETY_LAG_SECONDS:-2}

      SPARK_MASTER_PORT: ${SPARK_MASTER_PORT:-7077}

      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}

      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-miniominio}
      MINIO_API_PORT: ${MINIO_API_PORT:-9000}
      MINIO_STAGING_BUCKET: ${MINIO_STAGING_BUCKET:-staging}

      SPARK_MASTER_PORT: ${SPARK_MASTER_PORT:-7077}

    volumes:
      - urbangreen-airflow-logs-volume:/opt/airflow/logs
      - ./etl/dags:/opt/airflow/dags

    networks:
      - urbangreen-network

    healthcheck:
      test: [ "CMD-SHELL", "curl -fsS http://localhost:$${AIRFLOW_PORT:-8080}/api/v2/monitor/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G

volumes:
  urbangreen-postgres-data:
    name: urbangreen-postgres-data
  urbangreen-minio-data:
    name: urbangreen-minio-volume
  urbangreen-airflow-logs-volume:
    name: urbangreen-airflow-logs-volume

networks:
  urbangreen-network:
    name: urbangreen-network
