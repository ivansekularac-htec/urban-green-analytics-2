[project]
name = "urban-green-api"
version = "1.0.0"
description = "FastAPI application for Urban Green Farms"
requires-python = ">=3.10.0"

dependencies = [
    "fastapi-users[sqlalchemy]>=15.0.5",
    "fastapi[standard]>=0.115",
    "psycopg2>=2.9.12",
    "pydantic-settings>=2.14.1",
    "python-dotenv>=1.2.2",
] # Add more dependencies

# Optional
[project.optional-dependencies]
dev = ["pytest", "ruff"]


[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = [".venv", "build", "dist", "migrations"]

[tool.ruff.lint]
# A reasonable starter set
select = [
    "E", # pycodestyle errors
    "W", # pycodestyle warnings
    "F", # pyflakes
    "I", # isort (import sorting)
    "B", # flake8-bugbear
    "UP", # pyupgrade
    "SIM", # flake8-simplify
    "C4", # flake8-comprehensions
    "N", # pep8-naming
]
ignore = [
    "E501", # line length handled by formatter
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]     # allow asserts in tests
"__init__.py" = ["F401"] # allow unused imports for re-exports

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
docstring-code-format = true
