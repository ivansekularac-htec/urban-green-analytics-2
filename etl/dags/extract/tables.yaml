# Registry of app.* tables to extract (config as data — not code).
# Add/remove a table here; the factory in extract_app_tables.py builds its DAG.
#
#   name             table name in the `app` schema
#   schedule         Airflow schedule (defaults to @daily)
#   partition_by     optional column whose date partitions the output on disk
#   partition_label  optional on-disk partition folder label

defaults:
  schedule: "@daily"

tables:
  - name: roles
  - name: quality_grades
  - name: farm_infrastructure_types
  - name: growing_system_types
  - name: crop_categories
  - name: sensor_types
  - name: farms
  - name: users
  - name: crops
  - name: user_roles
  - name: farm_crops
  - name: sensors

  # harvests: hourly + partitioned on disk by the harvest's own date (created_at)
  - name: harvests
    schedule: "@hourly"
    partition_by: created_at
    partition_label: harvest_date
